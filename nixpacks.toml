[phases.setup]
nixPkgs = [
  "python311",
  "gcc",
  "zlib",
  "glib",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "libxcb",
  "libxkbcommon",
  "mesa",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
  "playwright install-deps chromium",
]

[start]
cmd = "python run_bot.py"
